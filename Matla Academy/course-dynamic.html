<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course | Matla Academy</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="styles.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans','Space Grotesk',system-ui,sans-serif;background:#f1f5f9;min-height:100vh}
[data-theme="dark"] body,[data-theme="grey"] body{background:#0f172a;color:#e2e8f0}

.course-layout{display:flex;min-height:100vh}
.crs-sidebar{width:280px;flex-shrink:0;background:#fff;border-right:1px solid #e2e8f0;position:sticky;top:0;height:100vh;overflow-y:auto;padding:1.5rem 1rem}
[data-theme="dark"] .crs-sidebar{background:#0d1428;border-color:rgba(255,255,255,0.08)}
.crs-sidebar-title{font-family:'Space Grotesk',sans-serif;font-size:0.95rem;font-weight:700;color:#0f172a;margin-bottom:1.25rem;padding-bottom:0.75rem;border-bottom:1px solid #e2e8f0}
[data-theme="dark"] .crs-sidebar-title{color:#f1f5f9;border-color:rgba(255,255,255,0.08)}
.mod-nav-item{display:flex;align-items:center;gap:0.625rem;padding:0.625rem 0.75rem;border-radius:9px;cursor:pointer;font-size:0.84rem;color:#475569;transition:all 0.2s;margin-bottom:0.25rem}
.mod-nav-item:hover{background:#f1f5f9;color:#0f172a}
.mod-nav-item.active{background:linear-gradient(135deg,#1e3a8a22,#2563eb11);color:#1e3a8a;font-weight:600}
[data-theme="dark"] .mod-nav-item.active{background:rgba(37,99,235,0.12);color:#93c5fd}
.mod-nav-num{width:24px;height:24px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;flex-shrink:0;color:#64748b}
.mod-nav-item.done .mod-nav-num{background:#dcfce7;color:#166534}
.mod-nav-item.active .mod-nav-num{background:#1e3a8a;color:#fff}

.crs-main{flex:1;padding:0}
.crs-hero{background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 100%);color:#fff;padding:3rem 2rem 2rem}
.crs-hero-badge{display:inline-flex;align-items:center;gap:0.4rem;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:50px;padding:0.25rem 0.875rem;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.8);margin-bottom:0.875rem}
.crs-hero-title{font-family:'Space Grotesk',sans-serif;font-size:2rem;font-weight:800;line-height:1.2;margin-bottom:0.5rem}
.crs-hero-desc{font-size:0.92rem;color:rgba(255,255,255,0.65);line-height:1.6;max-width:580px}
.crs-progress-bar-wrap{margin-top:1.5rem;background:rgba(255,255,255,0.1);border-radius:4px;height:6px;overflow:hidden}
.crs-progress-bar-fill{height:100%;background:linear-gradient(90deg,#60a5fa,#fbbf24);border-radius:4px;transition:width 0.6s ease}

.module-section{padding:2rem;border-bottom:1px solid #e2e8f0;position:relative}
[data-theme="dark"] .module-section{border-color:rgba(255,255,255,0.07)}
.module-header{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem}
.mod-num-badge{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#1e3a8a,#2563eb);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-size:0.95rem;font-weight:700;flex-shrink:0}
.mod-title{font-family:'Space Grotesk',sans-serif;font-size:1.2rem;font-weight:700;color:#0f172a}
[data-theme="dark"] .mod-title{color:#f1f5f9}
.mod-content{font-size:0.92rem;line-height:1.8;color:#374151;white-space:pre-wrap}
[data-theme="dark"] .mod-content{color:#cbd5e1}
.mod-video{margin-bottom:1.25rem;border-radius:12px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,0.15)}
.mod-video-label{background:#0f172a;color:#fbbf24;font-size:0.7rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:0.375rem 0.875rem;display:flex;align-items:center;gap:0.4rem}
.mod-video-frame{position:relative;padding-top:56.25%}
.mod-video-frame iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.mod-video-player{width:100%;display:block}
.mod-complete-btn{margin-top:1.5rem;padding:0.875rem 1.75rem;background:linear-gradient(135deg,#1e3a8a,#2563eb);color:#fff;border:none;border-radius:12px;font-family:'Space Grotesk',sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:0.5rem}
.mod-complete-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(30,58,138,0.35)}
.mod-complete-btn.done{background:linear-gradient(135deg,#166534,#16a34a);cursor:default}

.crs-finish-banner{background:linear-gradient(135deg,#166534,#16a34a);color:#fff;padding:2rem;text-align:center;display:none}
.cfb-title{font-family:'Space Grotesk',sans-serif;font-size:1.4rem;font-weight:800;margin-bottom:0.5rem}
.cfb-sub{font-size:0.9rem;opacity:0.85;margin-bottom:1.25rem}
.cfb-actions{display:flex;gap:0.875rem;justify-content:center;flex-wrap:wrap}
.cfb-btn{padding:0.75rem 1.5rem;border-radius:10px;font-family:'Space Grotesk',sans-serif;font-size:0.88rem;font-weight:700;cursor:pointer;border:none;transition:all 0.2s;text-decoration:none;display:inline-flex;align-items:center;gap:0.5rem}
.cfb-prim{background:#fff;color:#166534}
.cfb-sec{background:rgba(255,255,255,0.2);color:#fff;border:1px solid rgba(255,255,255,0.3)}
.cfb-btn:hover{transform:translateY(-2px);opacity:0.95}

.not-found{text-align:center;padding:4rem 2rem;color:#64748b}
.nf-icon{font-size:3rem;margin-bottom:1rem}
.nf-title{font-family:'Space Grotesk',sans-serif;font-size:1.2rem;font-weight:700;color:#374151;margin-bottom:0.5rem}
</style>
</head>
<body>
<nav class="enhanced-nav"></nav>
<aside id="sidebar" class="sidebar"></aside>

<div id="courseApp">
  <div class="not-found" id="notFoundMsg" style="display:none">
    <div class="nf-icon">📭</div>
    <div class="nf-title">Course not found</div>
    <p>This course may have been removed or the link is invalid.</p>
    <a href="courses.html" style="color:#1e3a8a;font-weight:600;margin-top:1rem;display:inline-block">← Back to Courses</a>
  </div>
</div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="script.js"></script>
<script src="course-injector.js"></script>
<script>
(function() {
  // Get course ID from URL params
  const params = new URLSearchParams(window.location.search);
  const storageKey = params.get('id');
  if (!storageKey) { document.getElementById('notFoundMsg').style.display = ''; return; }

  // Load course data
  let course = null;
  try {
    const custom = JSON.parse(localStorage.getItem('matla_admin_custom_courses') || '[]');
    course = custom.find(c => c.storageKey === storageKey);
  } catch {}
  if (!course) { document.getElementById('notFoundMsg').style.display = ''; return; }

  // Load progress
  let progress = { completed: [], xp: 0 };
  try { progress = JSON.parse(localStorage.getItem(storageKey) || '{}'); } catch {}
  if (!progress.completed) progress.completed = [];
  if (!progress.xp) progress.xp = 0;

  // Set page title
  document.title = course.title + ' | Matla Academy';

  // Build course UI
  const app = document.getElementById('courseApp');
  app.style.display = 'flex';
  app.className = 'course-layout';

  const totalMods = course.modules || (course.moduleList || []).length || 3;
  const pct = progress.completed.length ? Math.round(progress.completed.length / totalMods * 100) : 0;

  // Sidebar
  const sidebar = document.createElement('div');
  sidebar.className = 'crs-sidebar';
  sidebar.innerHTML = `
    <div class="crs-sidebar-title">${course.icon||'📚'} ${course.title}</div>
    <a href="courses.html" style="display:flex;align-items:center;gap:0.4rem;font-size:0.8rem;color:#64748b;text-decoration:none;margin-bottom:1rem">
      <i class="fas fa-arrow-left"></i> Back to Courses
    </a>
    <div id="modNavList"></div>
  `;
  app.appendChild(sidebar);

  // Main area
  const main = document.createElement('div');
  main.className = 'crs-main';
  main.innerHTML = `
    <div class="crs-hero" style="background:linear-gradient(135deg,#0f172a 0%,${course.color||'#1e3a8a'} 100%)">
      <div class="crs-hero-badge">${course.week ? 'Week ' + course.week : 'Academy'} · ${totalMods} Modules</div>
      <div class="crs-hero-title">${course.title}</div>
      <div class="crs-hero-desc">${course.description||''}</div>
      <div class="crs-progress-bar-wrap"><div class="crs-progress-bar-fill" id="heroProg" style="width:${pct}%"></div></div>
      <div style="margin-top:0.5rem;font-size:0.78rem;color:rgba(255,255,255,0.6)">${progress.completed.length}/${totalMods} modules completed · ${progress.xp||0} XP</div>
    </div>
    <div id="modulesContainer"></div>
    <div class="crs-finish-banner" id="finishBanner">
      <div class="cfb-title">🎉 Course Complete!</div>
      <div class="cfb-sub">You've finished all modules of ${course.title}. Well done!</div>
      <div class="cfb-actions">
        <a href="courses.html" class="cfb-btn cfb-prim"><i class="fas fa-book-open"></i> Browse More Courses</a>
        <a href="dashboard.html" class="cfb-btn cfb-sec"><i class="fas fa-chart-line"></i> My Dashboard</a>
      </div>
    </div>
  `;
  app.appendChild(main);

  // Build modules
  const modList = course.moduleList || [];
  const navList = sidebar.querySelector('#modNavList');
  const container = main.querySelector('#modulesContainer');

  for (let i = 0; i < totalMods; i++) {
    const mod = modList[i] || { title: 'Module ' + (i + 1), content: '' };
    const isDone = progress.completed.includes(i);

    // Sidebar nav item
    const navItem = document.createElement('div');
    navItem.className = 'mod-nav-item' + (isDone ? ' done' : '') + (i === 0 ? ' active' : '');
    navItem.id = 'nav-mod-' + i;
    navItem.innerHTML = `<div class="mod-nav-num">${isDone ? '✓' : i+1}</div><div>${mod.title}</div>`;
    navItem.onclick = () => document.getElementById('module-' + i)?.scrollIntoView({ behavior: 'smooth' });
    navList.appendChild(navItem);

    // Module section
    const section = document.createElement('section');
    section.className = 'module-section crs-module';
    section.id = 'module-' + i;

    // Check for admin-injected video
    let videoHtml = '';
    try {
      const edits = JSON.parse(localStorage.getItem('matla_admin_course_edits') || '{}');
      const courseId = storageKey.replace('matla_crs_', '');
      const modEdits = (edits[courseId]?.modules || {})[String(i)] || {};
      if (modEdits.videoUrl) {
        const url = modEdits.videoUrl;
        const ytId = (url.match(/(?:v=|youtu\.be\/|embed\/)([A-Za-z0-9_-]{11})/) || [])[1];
        const vimeoId = (url.match(/vimeo\.com\/(\d+)/) || [])[1];
        if (ytId) {
          videoHtml = `<div class="mod-video"><div class="mod-video-label">🎥 Module Video</div><div class="mod-video-frame"><iframe src="https://www.youtube.com/embed/${ytId}" allowfullscreen></iframe></div></div>`;
        } else if (vimeoId) {
          videoHtml = `<div class="mod-video"><div class="mod-video-label">🎥 Module Video</div><div class="mod-video-frame"><iframe src="https://player.vimeo.com/video/${vimeoId}" allowfullscreen></iframe></div></div>`;
        } else {
          videoHtml = `<div class="mod-video"><div class="mod-video-label">🎥 Module Video</div><video class="mod-video-player" src="${url}" controls></video></div>`;
        }
      }
    } catch {}

    section.innerHTML = `
      <div class="module-header">
        <div class="mod-num-badge">${isDone ? '✓' : i+1}</div>
        <div class="mod-title">${mod.title}</div>
      </div>
      ${videoHtml}
      <div class="mod-content">${mod.content || 'Module content will be added by your instructor.'}</div>
      <button class="mod-complete-btn${isDone?' done':''}" id="btn-mod-${i}" onclick="completeModule(${i})" ${isDone?'disabled':''}>
        ${isDone ? '<i class="fas fa-check-circle"></i> Module Complete' : '<i class="fas fa-check"></i> Mark as Complete · +100 XP'}
      </button>
    `;
    container.appendChild(section);
  }

  // Complete module function
  window.completeModule = function(idx) {
    if (progress.completed.includes(idx)) return;
    progress.completed.push(idx);
    progress.xp = (progress.xp || 0) + 100;
    localStorage.setItem(storageKey, JSON.stringify(progress));

    // Update button
    const btn = document.getElementById('btn-mod-' + idx);
    if (btn) { btn.className = 'mod-complete-btn done'; btn.disabled = true; btn.innerHTML = '<i class="fas fa-check-circle"></i> Module Complete'; }

    // Update nav
    const navItem = document.getElementById('nav-mod-' + idx);
    if (navItem) { navItem.classList.add('done'); navItem.querySelector('.mod-nav-num').textContent = '✓'; }

    // Update hero progress
    const newPct = Math.round(progress.completed.length / totalMods * 100);
    const heroBar = document.getElementById('heroProg');
    if (heroBar) heroBar.style.width = newPct + '%';

    // Check if all done
    if (progress.completed.length >= totalMods) {
      document.getElementById('finishBanner').style.display = '';
    }
  };
})();
</script>
</body>
</html>
