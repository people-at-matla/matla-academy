<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Export Documents – Matla Academy</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'DM Sans', 'Space Grotesk', system-ui, sans-serif; }

    /* ═══════════════════════════════════════════
       HERO
       ═══════════════════════════════════════════ */
    .ex-main { padding-top: var(--nav-h, 70px); display: flex; flex-direction: column; height: 100vh; }

    .ex-hero {
        background: linear-gradient(135deg, #0f172a 0%, #1a2d5a 48%, #1e3a8a 100%);
        padding: 1.8rem 0;
        position: relative; overflow: hidden; flex-shrink: 0;
    }
    .ex-hero::before {
        content: '';
        position: absolute; inset: 0;
        background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E") repeat;
        pointer-events: none;
    }
    .ex-blob {
        position: absolute; border-radius: 50%;
        filter: blur(70px); opacity: 0.12; pointer-events: none;
    }
    .ex-blob-1 { width: 350px; height: 350px; background: #3b82f6; top: -100px; right: 5%; }
    .ex-blob-2 { width: 220px; height: 220px; background: #f59e0b; bottom: -60px; left: 3%; }

    .ex-hero-inner {
        max-width: 1200px; margin: 0 auto; padding: 0 2rem;
        display: flex; align-items: center; gap: 2rem; flex-wrap: wrap;
        position: relative; z-index: 1;
    }
    .ex-hero-icon {
        width: 60px; height: 60px; border-radius: 16px;
        background: linear-gradient(135deg, #f59e0b, #d97706);
        display: flex; align-items: center; justify-content: center;
        font-size: 1.5rem; color: #fff; flex-shrink: 0;
        box-shadow: 0 0 0 6px rgba(245,158,11,0.2);
    }
    .ex-hero-text { flex: 1; min-width: 200px; }
    .ex-hero-label {
        font-size: 0.7rem; font-weight: 600;
        letter-spacing: 0.12em; text-transform: uppercase;
        color: rgba(255,255,255,0.45); margin-bottom: 0.25rem;
    }
    .ex-hero-title {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 1.6rem; font-weight: 800;
        color: #fff; line-height: 1.1; margin-bottom: 0.3rem;
    }
    .ex-hero-sub { font-size: 0.8rem; color: rgba(255,255,255,0.5); }

    .ex-hero-pills { display: flex; gap: 0.6rem; flex-wrap: wrap; }
    .ex-pill {
        background: rgba(255,255,255,0.07);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 10px; padding: 0.45rem 0.85rem;
        display: flex; align-items: center; gap: 0.5rem;
    }
    .ex-pill-val {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 1rem; font-weight: 800; color: #fff;
    }
    .ex-pill-lbl { font-size: 0.65rem; color: rgba(255,255,255,0.45); }

    .ex-hero-back {
        display: flex; align-items: center; gap: 0.4rem;
        font-size: 0.78rem; color: rgba(255,255,255,0.5);
        text-decoration: none; transition: color 0.2s;
        flex-shrink: 0;
    }
    .ex-hero-back:hover { color: #fff; }

    /* ═══════════════════════════════════════════
       LAYOUT
       ═══════════════════════════════════════════ */
    .export-layout {
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 0;
        flex: 1;
        min-height: 0;
        overflow: hidden;
    }
    @media (max-width: 900px) {
        .export-layout { grid-template-columns: 1fr; overflow: visible; }
        .preview-panel  { display: none; }
        .export-mobile-note { display: flex !important; }
    }

    /* ── Left panel ── */
    .export-sidebar {
        background: var(--color-bg-secondary, #f9fafb);
        border-right: 1px solid var(--color-border, #e5e7eb);
        padding: 1.5rem 1.25rem;
        overflow-y: auto;
    }
    [data-theme="dark"] .export-sidebar,
    [data-theme="blue"] .export-sidebar {
        background: var(--color-bg-secondary, #1e293b);
        border-color: var(--color-border, rgba(255,255,255,0.1));
    }

    .doc-type-btn {
        width: 100%; text-align: left;
        padding: 0.85rem;
        border-radius: 12px;
        border: 2px solid transparent;
        background: var(--color-bg-primary, #ffffff);
        cursor: pointer; transition: all 0.18s ease;
        display: flex; align-items: center; gap: 0.75rem;
        margin-bottom: 0.6rem;
    }
    [data-theme="dark"] .doc-type-btn,
    [data-theme="blue"] .doc-type-btn { background: var(--color-bg-tertiary, #334155); }
    .doc-type-btn:hover  { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
    .doc-type-btn.active { border-color: #3b82f6; background: #eff6ff; box-shadow: 0 0 0 3px rgba(59,130,246,0.12); }
    [data-theme="dark"] .doc-type-btn.active,
    [data-theme="blue"] .doc-type-btn.active { background: rgba(59,130,246,0.2); }

    .doc-icon {
        width: 40px; height: 40px; border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        font-size: 1rem; flex-shrink: 0;
    }
    .doc-btn-label  { font-weight: 700; font-size: 0.85rem; color: var(--color-text-primary,#111827); }
    .doc-btn-sub    { font-size: 0.72rem; color: var(--color-text-secondary,#6b7280); margin-top: 0.1rem; }

    /* ── Right panel ── */
    .preview-panel {
        background: #e5e7eb;
        display: flex; flex-direction: column;
        align-items: center;
        padding: 2rem 2rem 1.5rem;
        overflow-y: auto; gap: 1.25rem;
    }
    [data-theme="dark"] .preview-panel,
    [data-theme="blue"] .preview-panel { background: #0f172a; }

    /* A4 preview */
    .a4-wrapper {
        width: 100%; max-width: 680px;
        aspect-ratio: 210 / 297; position: relative;
    }
    .a4-doc {
        width: 100%; height: 100%;
        background: #ffffff;
        box-shadow: 0 8px 40px rgba(0,0,0,0.22);
        border-radius: 2px; overflow: hidden;
        display: flex; flex-direction: column;
        font-family: 'DM Sans', sans-serif;
        position: relative;
    }
    .doc-header {
        background: linear-gradient(135deg, #0a1440 0%, #0f1f5c 40%, #1a2d6a 100%);
        padding: 1.1rem 1.6rem;
        display: flex; align-items: center; justify-content: space-between;
        flex-shrink: 0;
        position: relative; overflow: hidden;
        min-height: 80px;
    }
    /* Matla geometric orange triangle — top-right */
    .doc-header::before {
        content: '';
        position: absolute; top: 0; right: 0;
        width: 0; height: 0;
        border-style: solid;
        border-width: 0 90px 90px 0;
        border-color: transparent rgba(232,93,42,0.25) transparent transparent;
        pointer-events: none;
    }
    /* Matla bottom accent stripe — navy + orange dominant */
    .doc-header::after {
        content: '';
        position: absolute; bottom: 0; left: 0;
        width: 100%; height: 3.5px;
        background: linear-gradient(90deg, #e85d2a 0%, #f59e0b 35%, #1a2d6a 70%, #0a1440 100%);
    }
    .doc-header-logo { width: 96px; max-height: 54px; object-fit: contain; filter: brightness(0) invert(1) drop-shadow(0 1px 4px rgba(0,0,0,0.2)); }
    .doc-header-fallback { color: #fff; font-family: 'Space Grotesk',sans-serif; font-weight: 800; font-size: 1.1rem; letter-spacing: 0.05em; }
    .doc-title-block { text-align: right; }
    .doc-title-block h2 { color: #fff; font-family: 'Space Grotesk',sans-serif; font-weight: 700; font-size: clamp(0.75rem,1.4vw,1rem); margin: 0; }
    .doc-title-block p  { color: rgba(255,255,255,0.65); font-size: clamp(0.55rem,0.9vw,0.75rem); margin: 0.15rem 0 0; }

    .doc-body { flex: 1; padding: 1.4rem 1.6rem; overflow: hidden; position: relative; background: linear-gradient(160deg, #ffffff 0%, #f6f9ff 100%); }
    .doc-body::after { content: 'M'; position: absolute; right: -0.5rem; bottom: -1rem; font-family: 'Space Grotesk',sans-serif; font-size: 10rem; font-weight: 900; color: rgba(30,64,175,0.04); line-height: 1; pointer-events: none; user-select: none; }
    .doc-section-label { font-size: clamp(0.5rem,0.8vw,0.7rem); font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #1d4ed8; margin-bottom: 0.42rem; padding-left: 0.5rem; border-left: 2.5px solid #3b82f6; }
    .doc-h3  { font-family: 'Space Grotesk',sans-serif; font-weight: 800; font-size: clamp(0.85rem,1.7vw,1.3rem); color: #111827; margin-bottom: 0.2rem; }
    .doc-meta { font-size: clamp(0.5rem,0.8vw,0.7rem); color: #9ca3af; margin-bottom: 0.85rem; }
    .doc-divider { height: 1px; background: linear-gradient(90deg, transparent, #bfdbfe 20%, #ddd6fe 60%, #bfdbfe 80%, transparent); margin: 0.7rem 0; }
    .doc-stat-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 0.45rem; margin-bottom: 0.7rem; }
    .doc-stat-box { background: linear-gradient(145deg, #f0f7ff, #e8f2ff); border: 1px solid #bfdbfe; border-radius: 8px; padding: 0.6rem 0.5rem; text-align: center; position: relative; overflow: hidden; }
    .doc-stat-box::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2.5px; background: linear-gradient(90deg, #1e40af, #3b82f6); }
    .doc-stat-value { font-family: 'Space Grotesk',sans-serif; font-weight: 800; font-size: clamp(0.75rem,1.4vw,1.1rem); color: #1e40af; }
    .doc-stat-label { font-size: clamp(0.45rem,0.65vw,0.6rem); color: #6b7280; margin-top: 0.1rem; }
    .doc-progress-bar { height: 8px; background: #e5e7eb; border-radius: 99px; overflow: hidden; margin-top: 0.25rem; }
    .doc-progress-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #1e3a8a, #2563eb, #60a5fa); }
    .doc-progress-fill.green { background: linear-gradient(90deg, #14532d, #16a34a, #4ade80); }
    .doc-progress-fill.gold  { background: linear-gradient(90deg, #92400e, #d97706, #fbbf24); }
    .doc-progress-fill.teal  { background: linear-gradient(90deg, #0f766e, #14b8a6, #5eead4); }
    .doc-progress-fill.grey  { background: linear-gradient(90deg, #9ca3af, #d1d5db); }
    .doc-row { display: flex; justify-content: space-between; align-items: center; padding: 0.32rem 0.5rem; font-size: clamp(0.5rem,0.8vw,0.7rem); border-bottom: 1px solid rgba(229,231,235,0.7); color: #374151; border-radius: 3px; }
    .doc-row:hover { background: rgba(239,246,255,0.7); }
    .doc-row span:last-child { font-weight: 600; color: #111827; }
    .doc-footer-strip { background: linear-gradient(135deg, #0a1440 0%, #0f1f5c 60%, #1a2d6a 100%); padding: 0.62rem 1.6rem; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; position: relative; overflow: hidden; }
    .doc-footer-strip::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2.5px; background: linear-gradient(90deg, #e85d2a 0%, #f59e0b 30%, rgba(255,255,255,0.15) 60%, rgba(255,255,255,0.05) 100%); }
    /* Footer Matla triangle accent — left side */
    .doc-footer-strip::after { content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 0; border-style: solid; border-width: 40px 0 0 40px; border-color: transparent transparent transparent rgba(232,93,42,0.18); pointer-events: none; }
    .doc-footer-text { font-size: clamp(0.42rem,0.6vw,0.58rem); color: rgba(255,255,255,0.65); }

    /* cert */
    .cert-seal { width: clamp(54px,8.5vw,80px); height: clamp(54px,8.5vw,80px); border-radius: 50%; background: linear-gradient(135deg,#f59e0b,#d97706); display: flex; align-items: center; justify-content: center; color: #fff; font-size: clamp(1rem,2vw,1.6rem); box-shadow: 0 0 0 4px #fef3c7, 0 0 0 8px rgba(245,158,11,0.2), 0 8px 24px rgba(245,158,11,0.45); flex-shrink: 0; }
    .cert-frame { border: 2px solid #e5e7eb; border-radius: 8px; padding: 0.6rem 1rem; margin: 0.3rem 0; position: relative; }
    .cert-frame::before { content: ''; position: absolute; inset: 4px; border: 1px solid rgba(245,158,11,0.25); border-radius: 5px; pointer-events: none; }
    .doc-badge { display: inline-flex; align-items: center; gap: 0.3rem; border-radius: 99px; padding: 0.2rem 0.6rem; font-size: clamp(0.42rem,0.62vw,0.58rem); font-weight: 700; }
    .doc-badge.blue  { background: #dbeafe; border: 1px solid #bfdbfe; color: #1d4ed8; }
    .doc-badge.green { background: #dcfce7; border: 1px solid #bbf7d0; color: #15803d; }
    .doc-badge.gold  { background: #fef3c7; border: 1px solid #fde68a; color: #92400e; }
    .doc-badge.teal  { background: #ccfbf1; border: 1px solid #99f6e4; color: #0f766e; }
    .doc-badge.grey  { background: #f3f4f6; border: 1px solid #e5e7eb; color: #6b7280; }

    /* ── Download bar ── */
    .download-bar {
        background: var(--color-bg-primary,#fff);
        border: 1px solid var(--color-border,#e5e7eb);
        border-radius: 12px;
        padding: 0.9rem 1.5rem;
        display: flex; align-items: center; justify-content: space-between;
        gap: 1rem; flex-wrap: wrap;
        width: 100%; max-width: 680px;
        flex-shrink: 0;
    }
    [data-theme="dark"] .download-bar,
    [data-theme="blue"] .download-bar { background: var(--color-bg-secondary,#1e293b); border-color: rgba(255,255,255,0.1); }

    .btn-download {
        background: linear-gradient(135deg,#1e40af,#3b82f6);
        color: #fff; padding: 0.65rem 1.5rem;
        border-radius: 9px; font-weight: 700; font-size: 0.88rem;
        display: flex; align-items: center; gap: 0.45rem;
        cursor: pointer; border: none;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
        position: relative; overflow: hidden;
    }
    .btn-download::before { content:''; position:absolute; top:0;left:-100%; width:100%;height:100%; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.22),transparent); transition:left 0.4s ease; }
    .btn-download:hover::before { left:100%; }
    .btn-download:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(30,64,175,0.38); }
    .btn-download:active { transform:scale(0.97); }

    /* options */
    .ex-opts-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--color-text-secondary,#6b7280); margin-bottom: 0.65rem; }
    .ex-opt-row { display: flex; align-items: center; gap: 0.55rem; font-size: 0.82rem; color: var(--color-text-primary,#374151); margin-bottom: 0.5rem; cursor: pointer; }
    .ex-opt-row input { accent-color: #3b82f6; width: 14px; height: 14px; cursor: pointer; }

    /* ── @media print ── */
    @media print {
        @page { size: A4; margin: 0; }
        body * { visibility: hidden; }
        #printTarget, #printTarget * { visibility: visible; }
        #printTarget { position: fixed; inset: 0; width: 210mm; height: 297mm; font-size: 11pt; }
        .doc-header        { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        .doc-footer-strip  { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        .doc-progress-fill { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        .cert-seal         { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        .doc-body          { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
    </style>
</head>
<body>
    <nav class="enhanced-nav"></nav>
    <aside id="sidebar" class="sidebar"></aside>
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div class="ex-main">

        <!-- ── Hero ─────────────────────────────────────────────── -->
        <section class="ex-hero">
            <div class="ex-blob ex-blob-1"></div>
            <div class="ex-blob ex-blob-2"></div>
            <div class="ex-hero-inner">
                <div class="ex-hero-icon"><i class="fas fa-file-export"></i></div>
                <div class="ex-hero-text">
                    <div class="ex-hero-label">Matla Academy · JFA Programme</div>
                    <h1 class="ex-hero-title">Export Documents</h1>
                    <p class="ex-hero-sub">Select a document type, preview it live, then download as PDF.</p>
                </div>
                <div class="ex-hero-pills">
                    <div class="ex-pill">
                        <div><div class="ex-pill-val">7</div><div class="ex-pill-lbl">Doc Types</div></div>
                    </div>
                    <div class="ex-pill">
                        <div><div class="ex-pill-val">A4</div><div class="ex-pill-lbl">Format</div></div>
                    </div>
                    <div class="ex-pill">
                        <div><div class="ex-pill-val">PDF</div><div class="ex-pill-lbl">Output</div></div>
                    </div>
                </div>
                <a href="javascript:history.back()" class="ex-hero-back"><i class="fas fa-arrow-left"></i> Back</a>
            </div>
        </section>

        <!-- Mobile note -->
        <div class="export-mobile-note" style="display:none;background:#fef3c7;border-bottom:1px solid #fde68a;padding:0.7rem 1.5rem;align-items:center;gap:0.5rem;font-size:0.82rem;color:#92400e;">
            <i class="fas fa-info-circle"></i> Preview hidden on small screens. Select a document and tap Download PDF.
        </div>

        <!-- ── Main layout ────────────────────────────────────────── -->
        <div class="export-layout">

            <!-- Left: doc selector -->
            <div class="export-sidebar">
                <p class="ex-opts-label" style="margin-bottom:0.85rem;">Choose Document</p>

                <button class="doc-type-btn active" onclick="selectDoc('progress')" id="btn-progress">
                    <div class="doc-icon" style="background:#eff6ff;color:#1d4ed8;"><i class="fas fa-chart-line"></i></div>
                    <div><div class="doc-btn-label">Progress Report</div><div class="doc-btn-sub">Programme completion &amp; weekly stats</div></div>
                </button>
                <button class="doc-type-btn" onclick="selectDoc('assessment')" id="btn-assessment">
                    <div class="doc-icon" style="background:#f0fdf4;color:#15803d;"><i class="fas fa-clipboard-check"></i></div>
                    <div><div class="doc-btn-label">Assessment Report</div><div class="doc-btn-sub">Scores, pass/fail &amp; topic breakdown</div></div>
                </button>
                <button class="doc-type-btn" onclick="selectDoc('certificate')" id="btn-certificate">
                    <div class="doc-icon" style="background:#fffbeb;color:#b45309;"><i class="fas fa-certificate"></i></div>
                    <div><div class="doc-btn-label">Achievement Certificate</div><div class="doc-btn-sub">Official Week 1 completion certificate</div></div>
                </button>
                <button class="doc-type-btn" onclick="selectDoc('studyplan')" id="btn-studyplan">
                    <div class="doc-icon" style="background:#f5f3ff;color:#6d28d9;"><i class="fas fa-calendar-alt"></i></div>
                    <div><div class="doc-btn-label">Study Plan</div><div class="doc-btn-sub">Personalised Week 2 schedule</div></div>
                </button>
                <button class="doc-type-btn" onclick="selectDoc('timetracking')" id="btn-timetracking">
                    <div class="doc-icon" style="background:#fdf2f8;color:#be185d;"><i class="fas fa-clock"></i></div>
                    <div><div class="doc-btn-label">Time Tracking</div><div class="doc-btn-sub">Hours logged per week &amp; session</div></div>
                </button>
                <button class="doc-type-btn" onclick="selectDoc('profile')" id="btn-profile">
                    <div class="doc-icon" style="background:#f0f9ff;color:#0369a1;"><i class="fas fa-user-tie"></i></div>
                    <div><div class="doc-btn-label">Performance Profile</div><div class="doc-btn-sub">Professional &amp; academic summary</div></div>
                </button>
                <button class="doc-type-btn" onclick="selectDoc('transcript')" id="btn-transcript">
                    <div class="doc-icon" style="background:#fff1f2;color:#be123c;"><i class="fas fa-scroll"></i></div>
                    <div><div class="doc-btn-label">W1 Assessment Transcript</div><div class="doc-btn-sub">Full Week 1 results &amp; Section A breakdown</div></div>
                </button>

                <!-- Options -->
                <div style="margin-top:1.4rem;padding-top:1.2rem;border-top:1px solid var(--color-border,#e5e7eb);">
                    <p class="ex-opts-label">Options</p>
                    <label class="ex-opt-row"><input type="checkbox" id="opt-date"   checked> Include date &amp; time</label>
                    <label class="ex-opt-row"><input type="checkbox" id="opt-logo"   checked> Show Matla Academy logo</label>
                    <label class="ex-opt-row"><input type="checkbox" id="opt-footer" checked> Show footer strip</label>
                </div>
            </div>

            <!-- Right: preview + download -->
            <div class="preview-panel">
                <div class="a4-wrapper" id="printTarget"></div>
                <div class="download-bar">
                    <div style="font-size:0.83rem;color:var(--color-text-secondary,#6b7280);">
                        <span id="docLabel" style="font-weight:700;color:var(--color-text-primary,#111827);">Progress Report</span>
                        &nbsp;·&nbsp; A4 &nbsp;·&nbsp; PDF
                    </div>
                    <button class="btn-download" onclick="downloadPDF()">
                        <i class="fas fa-file-pdf"></i> Download PDF
                    </button>
                </div>
            </div>
        </div>

    </div><!-- /ex-main -->

    <footer id="main-footer"></footer>
    <script src="script.js"></script>
    <script>
    /* ══════════════════════════════════════════════════════════════
       LOAD ALL DATA FROM localStorage
       ══════════════════════════════════════════════════════════════ */
    var currentDoc = 'progress';

    function lsJ(k) { try { return JSON.parse(localStorage.getItem(k)||'{}'); } catch(e){ return {}; } }

    var pro      = lsJ('matlaProfile');
    var salesRaw = lsJ('matla_crs_sales');
    var rmaRaw   = lsJ('matla_crs_rma');
    var capRaw   = lsJ('matla_crs_capital_legacy');
    var faisRaw  = lsJ('matla_crs_fais');
    var finRaw   = lsJ('matla_crs_fin_lit');
    var assessW1 = lsJ('matla_assess_w1');
    var streak   = parseInt(localStorage.getItem('matla_streak'),10) || 0;
    var emailRaw = localStorage.getItem('userEmail') || '';

    /* Computed identity */
    var today    = new Date().toLocaleDateString('en-ZA', { year:'numeric', month:'long', day:'numeric' });
    var userName = pro.name || (emailRaw ? emailRaw.split('@')[0].replace(/[._]/g,' ').replace(/\b\w/g,c=>c.toUpperCase()) : 'Student');

    /* Answer key (same as assessment-w1.html) */
    var ANSWER_KEY = {1:'B',2:'C',3:'C',4:'B',5:'D',6:'C',7:'B',8:'A',9:'C',10:'B',
                      11:'C',12:'A',13:'B',14:'B',15:'C',16:'C',17:'B',18:'C',19:'C',20:'D'};

    function topicPct(s,e){ var ans=assessW1.answers||{},c=0; for(var q=s;q<=e;q++) if(ans[q]===ANSWER_KEY[q]) c++; return Math.round(c/(e-s+1)*100); }

    /* Derived values */
    var salesF   = (salesRaw.completed||[]).length / 6;
    var rmaF     = Math.max((rmaRaw.completed||[]).length/7, (capRaw.completed||[]).length/7);
    var faisF    = (faisRaw.completed||[]).length / 7;
    var finF     = (finRaw.completed||[]).length  / 8;
    var w1F      = (salesF + rmaF + faisF + finF) / 4;
    var progPct  = Math.round(w1F * 25) + (assessW1.submitted ? 5 : 0);

    var courseXP = (salesRaw.xp||0) + (rmaRaw.xp||0) + (faisRaw.xp||0) + (finRaw.xp||0) + (capRaw.xp||0);
    var totalXP  = courseXP + (pro.assessW1Xp || 0);

    function secsToHrs(s){ return Math.round((s/3600)*10)/10; }
    var salesHrs = secsToHrs(salesRaw.timer||0);
    var rmaHrs   = secsToHrs(Math.max(rmaRaw.timer||0, capRaw.timer||0));
    var faisHrs  = secsToHrs(faisRaw.timer||0);
    var finHrs   = secsToHrs(finRaw.timer||0);
    var assessHrs= secsToHrs(assessW1.timeSpent||0);
    var totalHrs = Math.round((salesHrs+rmaHrs+faisHrs+finHrs+assessHrs)*10)/10;

    var sectionAPct = assessW1.submitted ? Math.round((assessW1.sectionAScore||0)/40*100) : null;
    var assessDate  = assessW1.endTime ? new Date(assessW1.endTime).toLocaleDateString('en-ZA',{day:'numeric',month:'short',year:'numeric'}) : null;

    var salesTopicPct = assessW1.submitted ? topicPct(1,5)  : null;
    var prodTopicPct  = assessW1.submitted ? topicPct(6,10) : null;
    var faisTopicPct  = assessW1.submitted ? topicPct(11,15): null;
    var finTopicPct   = assessW1.submitted ? topicPct(16,20): null;

    /* ── Options helpers ───────────────────────────────────────── */
    function optDate()   { return document.getElementById('opt-date')   ? document.getElementById('opt-date').checked   : true; }
    function optLogo()   { return document.getElementById('opt-logo')   ? document.getElementById('opt-logo').checked   : true; }
    function optFooter() { return document.getElementById('opt-footer') ? document.getElementById('opt-footer').checked : true; }

    function docHeaderHtml(title, subtitle, accentColor) {
        return '<div class="doc-header">' +
            /* Small secondary orange triangle decoration — bottom-left of header */
            '<div style="position:absolute;bottom:0;left:0;width:0;height:0;border-style:solid;border-width:0 0 42px 42px;border-color:transparent transparent rgba(232,93,42,0.22) transparent;pointer-events:none;"></div>' +
            /* Logo block */
            (optLogo()
                ? '<div style="display:flex;align-items:center;gap:0.55rem;position:relative;z-index:1;">' +
                    '<img src="Matla%20Academy%20.png" class="doc-header-logo" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'block\';" alt="Matla Academy">' +
                    '<div class="doc-header-fallback" style="display:none;color:#fff;font-family:Space Grotesk,sans-serif;font-weight:800;font-size:1rem;letter-spacing:0.05em;">MATLA</div>' +
                  '</div>'
                : '<div style="color:#fff;font-family:Space Grotesk,sans-serif;font-weight:800;font-size:1rem;letter-spacing:0.05em;position:relative;z-index:1;">MATLA</div>') +
            /* Title block */
            '<div class="doc-title-block" style="position:relative;z-index:1;">' +
                '<div style="display:inline-flex;align-items:center;gap:0.3rem;background:rgba(232,93,42,0.2);border:1px solid rgba(232,93,42,0.35);border-radius:99px;padding:0.15rem 0.65rem;font-size:clamp(0.38rem,0.55vw,0.5rem);font-weight:700;color:rgba(255,220,180,0.9);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:0.22rem;">JFA &rarr; FA Programme</div>' +
                '<h2 style="color:#fff;font-family:Space Grotesk,sans-serif;font-weight:700;font-size:clamp(0.75rem,1.4vw,1rem);margin:0;">' + title + '</h2>' +
                '<p style="color:rgba(255,255,255,0.5);font-size:clamp(0.45rem,0.7vw,0.62rem);margin:0.1rem 0 0;">' + (subtitle || 'Matla Academy — JFA &rarr; FA Programme') + '</p>' +
            '</div>' +
            '</div>';
    }

    function docFooterHtml() {
        if (!optFooter()) return '';
        return '<div class="doc-footer-strip">' +
            /* Orange triangle bottom-right corner accent */
            '<div style="position:absolute;bottom:0;right:0;width:0;height:0;border-style:solid;border-width:0 38px 38px 0;border-color:transparent rgba(232,93,42,0.2) transparent transparent;pointer-events:none;"></div>' +
            '<span class="doc-footer-text" style="position:relative;z-index:1;display:flex;align-items:center;gap:0.4rem;">' +
                '<span style="display:inline-block;width:14px;height:14px;background:linear-gradient(135deg,#e85d2a,#f59e0b);clip-path:polygon(50% 0%,100% 100%,0% 100%);flex-shrink:0;opacity:0.85;"></span>' +
                'Matla Academy — JFA &rarr; FA Accelerator Programme' +
            '</span>' +
            '<span class="doc-footer-text" style="position:relative;z-index:1;">' + (optDate() ? 'Generated ' + today : 'Confidential') + '</span>' +
            '</div>';
    }

    /* ── Module row helper (progress bar) ──────────────────────── */
    function modRow(name, pct, status, fillClass) {
        fillClass = fillClass || '';
        return '<div style="margin-bottom:0.38rem;">' +
            '<div style="display:flex;justify-content:space-between;font-size:clamp(0.5rem,0.78vw,0.68rem);color:#374151;margin-bottom:0.14rem;">' +
            '<span>' + name + '</span>' +
            '<span style="font-weight:700;color:' + (status==='Completed'?'#15803d': status==='In Progress'?'#1d4ed8' : '#9ca3af') + ';">' + status + '</span>' +
            '</div>' +
            '<div class="doc-progress-bar"><div class="doc-progress-fill ' + fillClass + '" style="width:' + pct + '%;"></div></div>' +
            '</div>';
    }

    /* ── Document templates ────────────────────────────────────── */
    var docs = {

        /* 1. Progress Report */
        progress: {
            label: 'Progress Report',
            render: function() {
                var w1Pct   = Math.round(w1F * 100);
                var avgScore = sectionAPct !== null ? sectionAPct + '%' : 'Pending';
                var weeksComplete = assessW1.submitted && sectionAPct >= 80 ? '1 / 4' : '0 / 4';
                return docHeaderHtml('Progress Report') +
                '<div class="doc-body">' +
                    '<div class="doc-section-label">Trainee Profile</div>' +
                    '<div class="doc-h3">' + userName + '</div>' +
                    '<div class="doc-meta">JFA Trainee &nbsp;&middot;&nbsp; ' + (optDate() ? 'Generated ' + today : 'Matla Academy') + '</div>' +
                    '<div class="doc-divider"></div>' +
                    '<div class="doc-stat-row">' +
                        '<div class="doc-stat-box"><div class="doc-stat-value">' + progPct + '%</div><div class="doc-stat-label">Overall Progress</div></div>' +
                        '<div class="doc-stat-box"><div class="doc-stat-value">' + weeksComplete + '</div><div class="doc-stat-label">Weeks Complete</div></div>' +
                        '<div class="doc-stat-box"><div class="doc-stat-value">' + avgScore + '</div><div class="doc-stat-label">Academic Avg (Sec A)</div></div>' +
                    '</div>' +
                    '<div class="doc-section-label" style="margin-top:0.4rem;">Programme Breakdown</div>' +
                    modRow('Week 1: Sales Training', Math.round(salesF*100), salesF>=1?'Completed':salesF>0?'In Progress':'Not Started', salesF>=1?'green':'') +
                    modRow('Week 1: Product Knowledge', Math.round(rmaF*100), rmaF>=1?'Completed':rmaF>0?'In Progress':'Not Started', rmaF>=1?'green':'') +
                    modRow('Week 1: Compliance &amp; FAIS', Math.round(faisF*100), faisF>=1?'Completed':faisF>0?'In Progress':'Not Started', faisF>=1?'green':'') +
                    modRow('Week 1: Dear Money I', Math.round(finF*100), finF>=1?'Completed':finF>0?'In Progress':'Not Started', finF>=1?'green':'') +
                    modRow('Week 1 Assessment', assessW1.submitted?100:0, assessW1.submitted?'Submitted':'Pending', assessW1.submitted?'green':'grey') +
                    modRow('Week 2–4 + Final Exam', 0, 'Locked', 'grey') +
                    '<div class="doc-divider"></div>' +
                    '<div style="display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap;">' +
                        '<span class="doc-badge ' + (sectionAPct!==null&&sectionAPct>=80?'green':'blue') + '"><i class="fas fa-circle-check"></i> ' + (sectionAPct!==null&&sectionAPct>=80?'W1 Passed':'In Progress') + '</span>' +
                        '<span class="doc-badge gold"><i class="fas fa-fire"></i> ' + streak + '-Day Streak</span>' +
                        '<span class="doc-badge blue"><i class="fas fa-star"></i> ' + totalXP + ' XP Earned</span>' +
                        '<span style="font-size:clamp(0.45rem,0.65vw,0.6rem);color:#9ca3af;margin-left:auto;"><i class="fas fa-clock" style="margin-right:0.2rem;"></i>' + (totalHrs > 0 ? totalHrs + 'h' : '0h') + ' total study time</span>' +
                    '</div>' +
                '</div>' +
                docFooterHtml();
            }
        },

        /* 2. Assessment Report */
        assessment: {
            label: 'Assessment Report',
            render: function() {
                var scoreDisp   = sectionAPct !== null ? sectionAPct + '%' : '—';
                var passStatus  = sectionAPct !== null ? (sectionAPct>=80?'Passed':'Below 80%') : 'Not Taken';
                var passCol     = sectionAPct !== null ? (sectionAPct>=80?'#15803d':'#dc2626') : '#9ca3af';
                var tSales = salesTopicPct !== null ? salesTopicPct + '%' : '—';
                var tProd  = prodTopicPct  !== null ? prodTopicPct  + '%' : '—';
                var tFais  = faisTopicPct  !== null ? faisTopicPct  + '%' : '—';
                var tFin   = finTopicPct   !== null ? finTopicPct   + '%' : '—';
                return docHeaderHtml('Assessment Report') +
                '<div class="doc-body">' +
                    '<div class="doc-section-label">Trainee</div>' +
                    '<div class="doc-h3">' + userName + '</div>' +
                    '<div class="doc-meta">' + (optDate() ? 'Generated ' + today : 'Matla Academy') + '</div>' +
                    '<div class="doc-divider"></div>' +
                    '<div class="doc-stat-row">' +
                        '<div class="doc-stat-box"><div class="doc-stat-value">' + (assessW1.submitted?'1':'0') + '</div><div class="doc-stat-label">Completed</div></div>' +
                        '<div class="doc-stat-box"><div class="doc-stat-value">' + scoreDisp + '</div><div class="doc-stat-label">Section A Score</div></div>' +
                        '<div class="doc-stat-box"><div class="doc-stat-value">80%</div><div class="doc-stat-label">Pass Mark</div></div>' +
                    '</div>' +
                    '<div class="doc-section-label" style="margin-top:0.35rem;">Assessment Results</div>' +
                    '<div class="doc-row"><span>Week 1 — 50 questions · 150 marks · 90 min</span><span style="display:flex;gap:0.6rem;align-items:center;"><span>' + scoreDisp + ' (Sec A)</span><span style="color:' + passCol + ';font-weight:700;">' + passStatus + '</span></span></div>' +
                    '<div class="doc-row" style="color:#9ca3af;font-style:italic;"><span>Week 2–4 + Final Exam</span><span>Locked</span></div>' +
                    (assessW1.submitted
                        ? '<div class="doc-section-label" style="margin-top:0.45rem;">Week 1 — Section A Topic Breakdown</div>' +
                          '<div class="doc-row"><span>Sales Training (Q1–5)</span><span>' + tSales + '</span></div>' +
                          '<div class="doc-row"><span>Product Knowledge (Q6–10)</span><span>' + tProd + '</span></div>' +
                          '<div class="doc-row"><span>Compliance &amp; FAIS (Q11–15)</span><span>' + tFais + '</span></div>' +
                          '<div class="doc-row"><span>Dear Money I (Q16–20)</span><span>' + tFin + '</span></div>' +
                          '<div style="margin-top:0.4rem;padding:0.4rem 0.6rem;background:#f0fdf4;border-radius:6px;font-size:clamp(0.45rem,0.65vw,0.6rem);color:#15803d;"><i class="fas fa-info-circle"></i> Section B &amp; C (60+50 marks): Pending trainer review. Full 150-mark results will be updated once graded.</div>'
                        : '<div style="margin-top:0.5rem;padding:0.4rem 0.6rem;background:#eff6ff;border-radius:6px;font-size:clamp(0.45rem,0.65vw,0.6rem);color:#1d4ed8;"><i class="fas fa-info-circle"></i> Assessment not yet taken. Navigate to Courses to start.</div>') +
                    '<div class="doc-divider"></div>' +
                    '<div style="font-size:clamp(0.45rem,0.65vw,0.6rem);color:#9ca3af;">Pass mark: 80% &nbsp;&middot;&nbsp; 1 retry permitted per assessment &nbsp;&middot;&nbsp; Sec B &amp; C graded by trainer</div>' +
                '</div>' +
                docFooterHtml();
            }
        },

        /* 3. Achievement Certificate */
        certificate: {
            label: 'Achievement Certificate',
            render: function() {
                var year   = new Date().getFullYear();
                var certId = 'MA-JFA-W1-' + (userName.replace(/\s/g,'').slice(0,4).toUpperCase()) + '-' + year;
                return docHeaderHtml('Certificate of Achievement', 'Matla Academy — Official Certification') +
                /* ── Certificate body: Matla navy + orange theme ── */
                '<div class="doc-body" style="text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.5rem;padding:1rem 1.8rem;background:linear-gradient(150deg,#0a1440 0%,#0f1f5c 45%,#12245e 100%);position:relative;overflow:hidden;">' +
                    /* Navy background "M" watermark */
                    '<div style="position:absolute;right:-1rem;bottom:-2rem;font-family:Space Grotesk,sans-serif;font-size:12rem;font-weight:900;color:rgba(255,255,255,0.04);line-height:1;pointer-events:none;user-select:none;letter-spacing:-0.05em;">M</div>' +
                    /* Orange triangle top-right */
                    '<div style="position:absolute;top:0;right:0;width:0;height:0;border-style:solid;border-width:0 70px 70px 0;border-color:transparent rgba(232,93,42,0.35) transparent transparent;pointer-events:none;"></div>' +
                    /* Orange triangle bottom-left */
                    '<div style="position:absolute;bottom:2.8rem;left:0;width:0;height:0;border-style:solid;border-width:0 0 60px 60px;border-color:transparent transparent rgba(232,93,42,0.25) transparent;pointer-events:none;"></div>' +
                    /* Outer ornate border — white/gold */
                    '<div style="position:absolute;inset:0.35rem;border:1px solid rgba(255,255,255,0.1);border-radius:5px;pointer-events:none;"></div>' +
                    '<div style="position:absolute;inset:0.6rem;border:0.5px solid rgba(232,93,42,0.18);border-radius:4px;pointer-events:none;"></div>' +
                    /* Corner L-marks — orange */
                    '<div style="position:absolute;top:0.55rem;left:0.55rem;width:13px;height:13px;border-top:2px solid #e85d2a;border-left:2px solid #e85d2a;"></div>' +
                    '<div style="position:absolute;top:0.55rem;right:0.55rem;width:13px;height:13px;border-top:2px solid #e85d2a;border-right:2px solid #e85d2a;"></div>' +
                    '<div style="position:absolute;bottom:2.6rem;left:0.55rem;width:13px;height:13px;border-bottom:2px solid #e85d2a;border-left:2px solid #e85d2a;"></div>' +
                    '<div style="position:absolute;bottom:2.6rem;right:0.55rem;width:13px;height:13px;border-bottom:2px solid #e85d2a;border-right:2px solid #e85d2a;"></div>' +
                    /* Seal — orange circle with M */
                    '<div class="cert-seal" style="background:linear-gradient(135deg,#e85d2a,#f59e0b);box-shadow:0 0 0 4px rgba(232,93,42,0.2),0 0 0 8px rgba(245,158,11,0.12),0 8px 24px rgba(232,93,42,0.4);">' +
                        '<span style="font-family:Space Grotesk,sans-serif;font-weight:900;font-size:1.5rem;color:#fff;line-height:1;letter-spacing:-0.04em;">M</span>' +
                    '</div>' +
                    '<div style="font-size:clamp(0.42rem,0.65vw,0.58rem);font-weight:700;text-transform:uppercase;letter-spacing:0.24em;color:rgba(232,93,42,0.85);">Certificate of Achievement</div>' +
                    '<div style="font-size:clamp(0.5rem,0.74vw,0.64rem);color:rgba(255,255,255,0.5);margin-top:-0.05rem;">This is to certify that</div>' +
                    '<div style="font-family:Space Grotesk,sans-serif;font-weight:800;font-size:clamp(0.95rem,2vw,1.6rem);color:#ffffff;line-height:1.1;letter-spacing:-0.01em;text-shadow:0 2px 12px rgba(232,93,42,0.3);">' + userName + '</div>' +
                    '<div style="font-size:clamp(0.48rem,0.72vw,0.62rem);color:rgba(255,255,255,0.45);">has successfully completed all modules and assessments of</div>' +
                    /* Programme title box — orange border */
                    '<div style="font-family:Space Grotesk,sans-serif;font-weight:700;font-size:clamp(0.65rem,1.2vw,0.95rem);color:#fff;background:rgba(232,93,42,0.15);border:1.5px solid rgba(232,93,42,0.45);border-radius:6px;padding:0.38rem 1.1rem;margin:0.05rem 0;position:relative;">Week 1: Sales &amp; Product Foundations</div>' +
                    '<div style="font-size:clamp(0.45rem,0.65vw,0.58rem);color:rgba(255,255,255,0.35);">JFA &rarr; FA Accelerator Programme &nbsp;&bull;&nbsp; Matla Academy &nbsp;&bull;&nbsp; FSCA-Aligned</div>' +
                    '<div style="display:flex;gap:0.4rem;align-items:center;justify-content:center;">' +
                        '<span style="display:inline-flex;align-items:center;gap:0.25rem;background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.35);border-radius:99px;padding:0.18rem 0.55rem;font-size:clamp(0.4rem,0.6vw,0.54rem);font-weight:700;color:#34d399;"><i class="fas fa-check-circle"></i> Assessment Score: ' + (sectionAPct!==null?sectionAPct+'%':'Pending') + ' (Sec A)</span>' +
                        '<span style="display:inline-flex;align-items:center;gap:0.25rem;background:rgba(232,93,42,0.18);border:1px solid rgba(232,93,42,0.4);border-radius:99px;padding:0.18rem 0.55rem;font-size:clamp(0.4rem,0.6vw,0.54rem);font-weight:700;color:#f59e0b;"><i class="fas fa-star"></i> Pass</span>' +
                    '</div>' +
                    '<div style="font-size:clamp(0.42rem,0.58vw,0.52rem);color:rgba(255,255,255,0.3);">' + (optDate() ? 'Awarded ' + today : '') + '</div>' +
                    '<div style="width:75%;height:1px;background:linear-gradient(90deg,transparent,rgba(232,93,42,0.5),rgba(245,158,11,0.4),transparent);margin:0.05rem auto;"></div>' +
                    '<div style="display:flex;gap:2.5rem;justify-content:center;">' +
                        '<div style="text-align:center;">' +
                            '<div style="width:clamp(50px,7.5vw,68px);height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);margin:0 auto 0.22rem;"></div>' +
                            '<div style="font-size:clamp(0.4rem,0.56vw,0.52rem);color:rgba(255,255,255,0.4);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;">Programme Director</div>' +
                        '</div>' +
                        '<div style="text-align:center;">' +
                            '<div style="width:clamp(50px,7.5vw,68px);height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);margin:0 auto 0.22rem;"></div>' +
                            '<div style="font-size:clamp(0.4rem,0.56vw,0.52rem);color:rgba(255,255,255,0.4);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;">Head of Training</div>' +
                        '</div>' +
                    '</div>' +
                '</div>' +
                '<div class="doc-footer-strip">' +
                    '<div style="position:absolute;bottom:0;right:0;width:0;height:0;border-style:solid;border-width:0 32px 32px 0;border-color:transparent rgba(232,93,42,0.22) transparent transparent;pointer-events:none;"></div>' +
                    '<span class="doc-footer-text" style="position:relative;z-index:1;display:flex;align-items:center;gap:0.4rem;">' +
                        '<span style="display:inline-block;width:12px;height:12px;background:linear-gradient(135deg,#e85d2a,#f59e0b);clip-path:polygon(50% 0%,100% 100%,0% 100%);flex-shrink:0;opacity:0.9;"></span>' +
                        'Matla Academy — JFA &rarr; FA Programme' +
                    '</span>' +
                    '<span class="doc-footer-text" style="position:relative;z-index:1;">Cert ID: ' + certId + '</span>' +
                '</div>';
            }
        },

        /* 4. Study Plan */
        studyplan: {
            label: 'Study Plan',
            render: function() {
                return docHeaderHtml('Personalised Study Plan', 'Week 2 — Advanced Sales &amp; Ethics') +
                '<div class="doc-body">' +
                    '<div class="doc-section-label">Prepared for</div>' +
                    '<div class="doc-h3">' + userName + '</div>' +
                    '<div class="doc-meta">' + (optDate() ? 'Week of ' + today : 'Matla Academy') + '</div>' +
                    '<div class="doc-divider"></div>' +
                    '<div class="doc-stat-row">' +
                        '<div class="doc-stat-box"><div class="doc-stat-value">Week 2</div><div class="doc-stat-label">Current Week</div></div>' +
                        '<div class="doc-stat-box"><div class="doc-stat-value">40%</div><div class="doc-stat-label">Complete</div></div>' +
                        '<div class="doc-stat-box"><div class="doc-stat-value">5</div><div class="doc-stat-label">Topics</div></div>' +
                    '</div>' +
                    '<div class="doc-section-label" style="margin-top:0.35rem;">Weekly Schedule</div>' +
                    [['Monday',   'Advanced Sales Techniques — Video (45 min) + Notes',        '1h 15m'],
                     ['Tuesday',  'Complex Product Solutions — Video (38 min) + Quiz practice', '1h'],
                     ['Wednesday','Ethics &amp; Conduct — Video (42 min) + Case study review',  '1h 10m'],
                     ['Thursday', 'Financial Planning Basics — Video (50 min) + Meneer AI',     '1h 20m'],
                     ['Friday',   'Week 2 Assessment — Mock test (30 min) + Attempt',           '1h'],
                     ['Saturday', 'Revision — Review W2 notes + Meneer AI Q&amp;A',            '1h'],
                     ['Sunday',   'Rest / Light reading',                                       '—']
                    ].map(function(r){ return '<div class="doc-row"><span style="font-weight:700;min-width:62px;flex-shrink:0;">'+r[0]+'</span><span style="flex:1;padding:0 0.4rem;">'+r[1]+'</span><span>'+r[2]+'</span></div>'; }).join('') +
                    '<div class="doc-divider"></div>' +
                    '<div style="font-size:clamp(0.45rem,0.65vw,0.6rem);color:#9ca3af;">Target: 80%+ on W2 Assessment to unlock Week 3 &nbsp;&middot;&nbsp; Focus: Sales techniques, ethics, financial planning</div>' +
                '</div>' +
                docFooterHtml();
            }
        },

        /* 5. Time Tracking */
        timetracking: {
            label: 'Time Tracking',
            render: function() {
                var maxH = Math.max(salesHrs, rmaHrs, faisHrs, finHrs, assessHrs, 0.1);
                function hFmt(h){ return h > 0 ? h + 'h' : '0h'; }
                function hBar(h){ return Math.round((h/maxH)*100); }
                var sessions = [salesF,rmaF,faisF,finF].filter(function(f){return f>0;}).length + (assessW1.submitted?1:0);
                return docHeaderHtml('Time Tracking Report') +
                '<div class="doc-body">' +
                    '<div class="doc-section-label">Trainee</div>' +
                    '<div class="doc-h3">' + userName + '</div>' +
                    '<div class="doc-meta">' + (optDate() ? 'Generated ' + today : 'Matla Academy') + '</div>' +
                    '<div class="doc-divider"></div>' +
                    '<div class="doc-stat-row">' +
                        '<div class="doc-stat-box"><div class="doc-stat-value">' + hFmt(totalHrs) + '</div><div class="doc-stat-label">Total Logged</div></div>' +
                        '<div class="doc-stat-box"><div class="doc-stat-value">' + hFmt(totalHrs) + '</div><div class="doc-stat-label">Week 1 Hours</div></div>' +
                        '<div class="doc-stat-box"><div class="doc-stat-value">' + sessions + '</div><div class="doc-stat-label">Courses/Assess</div></div>' +
                    '</div>' +
                    '<div class="doc-section-label" style="margin-top:0.35rem;">Hours by Course — Week 1</div>' +
                    [['Sales Training (Mon)', salesHrs, hBar(salesHrs), salesF>=1?'green':''],
                     ['Product Knowledge (Tue)', rmaHrs, hBar(rmaHrs), rmaF>=1?'green':''],
                     ['Compliance &amp; FAIS (Wed)', faisHrs, hBar(faisHrs), faisF>=1?'green':''],
                     ['Dear Money I (Thu)', finHrs, hBar(finHrs), finF>=1?'green':''],
                     ['Week 1 Assessment (Fri)', assessHrs, hBar(assessHrs), assessW1.submitted?'green':'grey']
                    ].map(function(r){
                        return '<div style="margin-bottom:0.35rem;"><div style="display:flex;justify-content:space-between;font-size:clamp(0.5rem,0.78vw,0.68rem);color:#374151;margin-bottom:0.12rem;"><span>'+r[0]+'</span><span style="font-weight:600;">'+hFmt(r[1])+'</span></div><div class="doc-progress-bar"><div class="doc-progress-fill '+r[3]+'" style="width:'+r[2]+'%;"></div></div></div>';
                    }).join('') +
                    '<div class="doc-divider"></div>' +
                    '<div class="doc-row"><span>Current Streak</span><span>' + streak + (streak===1?' day':' days') + '</span></div>' +
                    '<div class="doc-row"><span>Total XP Earned</span><span>' + totalXP + ' XP</span></div>' +
                    '<div class="doc-row"><span>Week 2–4</span><span style="color:#9ca3af;">Not yet started</span></div>' +
                '</div>' +
                docFooterHtml();
            }
        },

        /* 6. Performance Profile */
        profile: {
            label: 'Performance Profile',
            render: function() {
                var w1Score = sectionAPct !== null ? sectionAPct + '% (Sec A)' + (sectionAPct>=80?' ✓':'') : 'Pending';
                var w1Col   = sectionAPct !== null ? (sectionAPct>=80?'#15803d':'#dc2626') : '#1d4ed8';
                return docHeaderHtml('Performance Profile', 'Professional &amp; Academic Summary') +
                '<div class="doc-body">' +
                    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;">' +
                        '<div>' +
                            '<div class="doc-section-label">Professional Details</div>' +
                            ['Full Name|' + userName,
                             'Email|' + (emailRaw || '—'),
                             'Programme|JFA → FA Accelerator',
                             'Department|Financial Advisory',
                             'FSCA-Aligned|Yes',
                             'Start Date|' + today,
                             'Contract|Learner / JFA'
                            ].map(function(r){ var p=r.split('|'); return '<div class="doc-row"><span>'+p[0]+'</span><span>'+p[1]+'</span></div>'; }).join('') +
                        '</div>' +
                        '<div>' +
                            '<div class="doc-section-label">Academic Performance</div>' +
                            [['W1 Assessment', w1Score, w1Col],
                             ['W2 Assessment', 'Pending', '#1d4ed8'],
                             ['W3 Assessment', 'Locked',  '#9ca3af'],
                             ['W4 Assessment', 'Locked',  '#9ca3af'],
                             ['Final Exam',    'Locked',  '#9ca3af'],
                             ['Overall Avg',   sectionAPct!==null?sectionAPct+'%':'—', sectionAPct!==null&&sectionAPct>=80?'#15803d':'#1d4ed8']
                            ].map(function(r){ return '<div class="doc-row"><span>'+r[0]+'</span><span style="color:'+r[2]+';">'+r[1]+'</span></div>'; }).join('') +
                            '<div class="doc-section-label" style="margin-top:0.45rem;">Academy Activity</div>' +
                            ['Total XP|' + totalXP + ' XP',
                             'Study Time|' + (totalHrs > 0 ? totalHrs + 'h' : '0h'),
                             'Streak|' + streak + (streak===1?' day':' days'),
                             'Courses W1|' + Math.round(w1F*4) + ' / 4 complete'
                            ].map(function(r){ var p=r.split('|'); return '<div class="doc-row"><span>'+p[0]+'</span><span>'+p[1]+'</span></div>'; }).join('') +
                        '</div>' +
                    '</div>' +
                    '<div class="doc-divider"></div>' +
                    '<div style="display:flex;gap:0.4rem;flex-wrap:wrap;align-items:center;">' +
                        '<span style="font-size:clamp(0.45rem,0.65vw,0.6rem);color:#6b7280;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;">Standing:</span>' +
                        '<span class="doc-badge ' + (sectionAPct!==null&&sectionAPct>=80?'green':'blue') + '"><i class="fas fa-circle-check"></i> ' + (sectionAPct!==null&&sectionAPct>=80?'W1 Passed':'In Progress') + '</span>' +
                        '<span class="doc-badge gold"><i class="fas fa-fire"></i> ' + streak + '-Day Streak</span>' +
                        '<span class="doc-badge blue"><i class="fas fa-star"></i> ' + totalXP + ' XP</span>' +
                        '<span style="font-size:clamp(0.42rem,0.6vw,0.58rem);color:#9ca3af;margin-left:auto;">Sales sign-off: Pending</span>' +
                    '</div>' +
                '</div>' +
                docFooterHtml();
            }
        },

        /* 7. W1 Assessment Transcript */
        transcript: {
            label: 'W1 Assessment Transcript',
            render: function() {
                if (!assessW1.submitted) {
                    return docHeaderHtml('W1 Assessment Transcript', 'Week 1 — Detailed Results') +
                    '<div class="doc-body">' +
                        '<div class="doc-section-label">Candidate</div>' +
                        '<div class="doc-h3">' + userName + '</div>' +
                        '<div class="doc-divider"></div>' +
                        '<div style="text-align:center;padding:1.5rem 0;color:#9ca3af;font-size:clamp(0.55rem,0.8vw,0.72rem);">' +
                            '<i class="fas fa-clock" style="font-size:1.5rem;margin-bottom:0.5rem;display:block;"></i>' +
                            'Week 1 Assessment not yet taken.<br>Complete all Week 1 courses to unlock it.' +
                        '</div>' +
                    '</div>' +
                    docFooterHtml();
                }

                var answers    = assessW1.answers || {};
                var timeMins   = Math.round((assessW1.timeSpent||0)/60);
                var qRow = function(n, correct) {
                    var ans = answers[n] || '—';
                    var key = ANSWER_KEY[n];
                    var isC = ans === key;
                    return '<div style="display:flex;gap:0.4rem;align-items:center;margin-bottom:0.2rem;">' +
                        '<span style="min-width:1.6rem;font-size:clamp(0.42rem,0.6vw,0.55rem);color:#9ca3af;font-weight:700;">Q' + n + '</span>' +
                        '<span style="flex:1;font-size:clamp(0.42rem,0.6vw,0.55rem);color:#374151;">Answer: <strong>' + ans + '</strong></span>' +
                        '<span style="font-size:clamp(0.4rem,0.58vw,0.52rem);font-weight:700;color:' + (isC?'#15803d':'#dc2626') + ';">' + (isC?'✓ 2 pts':'✗ 0 pts') + '</span>' +
                    '</div>';
                };

                var topics = [
                    {label:'Sales Training (Q1–5)',    qs:[1,2,3,4,5],     pct:salesTopicPct,  col:'#3b82f6'},
                    {label:'Product Knowledge (Q6–10)', qs:[6,7,8,9,10],   pct:prodTopicPct,   col:'#06b6d4'},
                    {label:'Compliance &amp; FAIS (Q11–15)', qs:[11,12,13,14,15], pct:faisTopicPct, col:'#7c3aed'},
                    {label:'Dear Money I (Q16–20)',    qs:[16,17,18,19,20], pct:finTopicPct,    col:'#14b8a6'}
                ];

                var secAHtml = topics.map(function(t){
                    return '<div style="margin-bottom:0.5rem;">' +
                        '<div style="font-size:clamp(0.5rem,0.72vw,0.64rem);font-weight:700;color:' + t.col + ';margin-bottom:0.2rem;">' + t.label + ' — ' + t.pct + '%</div>' +
                        t.qs.map(function(n){ return qRow(n, answers[n]===ANSWER_KEY[n]); }).join('') +
                    '</div>';
                }).join('');

                return docHeaderHtml('W1 Assessment Transcript', 'Week 1 — Detailed Results') +
                '<div class="doc-body">' +
                    '<div class="doc-section-label">Candidate</div>' +
                    '<div class="doc-h3">' + userName + '</div>' +
                    '<div class="doc-meta">Date submitted: ' + (assessDate||'—') + ' &nbsp;&middot;&nbsp; Time taken: ' + timeMins + ' min</div>' +
                    '<div class="doc-divider"></div>' +
                    '<div class="doc-stat-row">' +
                        '<div class="doc-stat-box"><div class="doc-stat-value">' + sectionAPct + '%</div><div class="doc-stat-label">Section A Score</div></div>' +
                        '<div class="doc-stat-box"><div class="doc-stat-value">' + (assessW1.sectionAScore||0) + '/40</div><div class="doc-stat-label">Sec A Marks</div></div>' +
                        '<div class="doc-stat-box"><div class="doc-stat-value">' + (sectionAPct>=80?'Pass':'Below 80%') + '</div><div class="doc-stat-label">Sec A Result</div></div>' +
                    '</div>' +
                    '<div class="doc-section-label" style="margin-top:0.35rem;">Section A — Multiple Choice (40 marks)</div>' +
                    secAHtml +
                    '<div class="doc-divider"></div>' +
                    '<div style="padding:0.4rem 0.6rem;background:#eff6ff;border-radius:6px;font-size:clamp(0.45rem,0.65vw,0.6rem);color:#1d4ed8;">' +
                        '<strong>Section B (60 marks) &amp; Section C (50 marks):</strong> Written responses — pending trainer review. Full 150-mark transcript will be issued after grading.' +
                    '</div>' +
                '</div>' +
                docFooterHtml();
            }
        }
    };

    /* ── Select document ───────────────────────────────────────── */
    function selectDoc(type) {
        currentDoc = type;
        document.querySelectorAll('.doc-type-btn').forEach(function(b){ b.classList.remove('active'); });
        var btn = document.getElementById('btn-' + type);
        if (btn) btn.classList.add('active');
        document.getElementById('docLabel').textContent = docs[type].label;
        renderPreview();
    }

    function renderPreview() {
        var target = document.getElementById('printTarget');
        if (target) target.innerHTML = '<div class="a4-doc">' + docs[currentDoc].render() + '</div>';
    }

    function downloadPDF() { window.print(); }

    /* ── Option toggles ────────────────────────────────────────── */
    ['opt-date','opt-logo','opt-footer'].forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.addEventListener('change', renderPreview);
    });

    document.addEventListener('DOMContentLoaded', function() { renderPreview(); });
    </script>
</body>
</html>
